short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University. My research examines how governments design and
    implement contracting and governance arrangements to advance sustainability and innovation, and the
    organizational conditions that shape public sector capacity to do so.
  </p>
  <p>
    My work is organized around three streams: the determinants of innovative and sustainable public service
    provision; public procurement as a strategic policy instrument for advancing public values rather than simply
    allocating resources; and the workplace conditions and human capital factors that shape public sector
    professionals, with particular attention to public procurement officials. More recently, I have extended this
    agenda to the governance of emerging technologies, particularly artificial intelligence, in public organizations.
    This line of work includes a forthcoming <em>Public Administration</em> special issue on AI in public
    organizations and Routledge's <em>The Essential Guide to Public Procurement: Bridging Theory and Practice</em>,
    both of which I co-edit.
  </p>
  <p>
    I have pursued external and internal funding for this research, including a grant from the IBM Center for the
    Business of Government on digital transformation and responsible technology use in public procurement, an FSU
    First-Year Assistant Professor Grant, and a Co-PI role on an NSF Global Centers proposal on equitable climate
    procurement. I came to public administration by way of the law, having begun my career as a legal advisor in
    Romania, an experience that continues to inform how I think about rules, administrative discretion, and sound
    outcomes for the public.
  </p>
  <p>
    I am committed to keeping scholarship in close conversation with practice. I write for practitioners and
    policymakers and prepare applied research with organizations such as NIGP, NASPO, NASCIO, the Publications Office
    of the European Union, and the IBM Center for the Business of Government. I also serve as Social Media Editor at
    the <em>Journal of Public Administration Research and Theory</em> (JPART) and as Digital Engagement Associate
    Editor at the <em>Journal of Public Affairs Education</em> (JPAE).
  </p>

