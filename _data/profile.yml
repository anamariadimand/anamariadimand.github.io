short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University, and a Global Research Fellow with the
    Sustainable Procurement Research Initiative at American University. I am fascinated by something most people
    never think about: how governments buy, contract, and partner to get things done &mdash; and how those everyday
    decisions can become powerful tools for sustainability, innovation, and equity.
  </p>
  <p>
    My research follows three threads: what makes public service provision more innovative and sustainable; how
    procurement can be used as a strategic instrument to advance public values rather than simply move money; and
    the workplace conditions and human capital that shape the professionals behind it all. Lately I have been drawn
    to what happens when emerging technologies, especially AI, meet the public sector, and to the organizational
    conditions that let agencies actually put new ideas into practice.
  </p>
  <p>
    I came to this work by way of the law &mdash; I started my career as a lawyer in Romania &mdash; which still
    shapes how I think about rules, discretion, and getting good outcomes for the public. I care a great deal about
    keeping research in conversation with practice, so I write for practitioners and policymakers and collaborate
    with organizations such as NIGP, NASPO, and the IBM Center for the Business of Government. I also serve as Social
    Media Editor at <em>JPART</em> and Digital Engagement Associate Editor at <em>JPAE</em>.
  </p>

