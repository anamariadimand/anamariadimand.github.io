short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/faculty/ana-maria-dimand/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University.
  </p>
  <p>
    My research centers on public management and policy, particularly addressing government contracting,
    collaborative governance, innovation, and sustainability issues.
  </p>

