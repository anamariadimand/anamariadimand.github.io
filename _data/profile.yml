short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University. I am passionate about understanding how governments buy,
    contract, and partner to deliver public goods and services &mdash; and how these seemingly routine administrative
    decisions can become powerful instruments for advancing sustainability, innovation, and equity.
  </p>
  <p>
    My research advances along three interrelated streams: the determinants of innovative and sustainable public
    service provision; public procurement as a strategic policy instrument for advancing public values rather than
    merely allocating resources; and the workplace conditions and human capital that shape the professionals who
    carry this work forward. More recently, I have turned to the governance of emerging technologies &mdash;
    particularly artificial intelligence &mdash; in the public sector, and to the organizational conditions that
    enable agencies to translate new ideas into practice.
  </p>
  <p>
    I came to public administration by way of the law, beginning my career as a legal advisor in Romania &mdash; an
    experience that continues to shape how I think about rules, administrative discretion, and the pursuit of good
    outcomes for the public. I am committed to keeping scholarship in close conversation with practice: I write for
    practitioners and policymakers and collaborate with organizations such as NIGP, NASPO, and the IBM Center for the
    Business of Government. I also serve as Social Media Editor at the <em>Journal of Public Administration Research
    and Theory</em> (JPART) and Digital Engagement Associate Editor at the <em>Journal of Public Affairs Education</em>
    (JPAE).
  </p>

