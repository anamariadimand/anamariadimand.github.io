short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University. Government procurement is one of the most consequential
    yet understudied policy instruments available to public administrators, and my research examines how governments
    design and implement contracting and governance arrangements to advance sustainability and innovation, as well as
    the organizational conditions that shape public sector capacity to carry out these goals. This work is grounded in
    public administration and policy theory and informed by extensive practitioner experience, drawing on diverse
    quantitative and qualitative methods across primary and secondary data.
  </p>
  <p>
    My research advances three interrelated streams: the organizational and institutional determinants of innovative
    and sustainable public service provision; the use of procurement as a strategic policy instrument to advance
    public values rather than as a bureaucratic necessity; and the workplace conditions and human capital factors that
    shape attitudes, retention, and innovation capacity among public sector professionals, with particular attention
    to public procurement officials. Across all three, I actively pursue external funding and extend my work toward
    emerging questions about technology, capacity, and ethics in public administration, including the responsible use
    of artificial intelligence in public organizations.
  </p>
  <p>
    I came to public administration by way of the law and public practice, having served as a legal advisor and later
    as Head of the Public Procurement Office at Romania's National Trade Registry before completing my doctorate. That
    experience continues to inform how I think about rules, administrative discretion, and sound outcomes for the
    public.
  </p>
  <p>
    I am committed to keeping scholarship in close conversation with practice. I write for practitioners and
    policymakers and prepare applied research with organizations such as NIGP, NASPO, NASCIO, the Publications Office
    of the European Union, and the IBM Center for the Business of Government. I also serve as Social Media Editor at
    the <em>Journal of Public Administration Research and Theory</em> (JPART) and as Digital Engagement Associate
    Editor at the <em>Journal of Public Affairs Education</em> (JPAE).
  </p>

