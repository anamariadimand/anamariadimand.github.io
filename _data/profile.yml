short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University.
  </p>
  <p>
    I am a public management and public policy scholar whose work centers on government contracting, environmental
    policy, sustainability, innovation, and collaborative governance.
  </p>
  <p>
    My research advances three interrelated streams: the determinants of innovative and sustainable public service
    provision; the use of procurement as a strategic policy instrument for advancing public values; and the workplace
    conditions and human capital factors that shape attitudes, retention, and innovation capacity among public sector
    professionals, with particular attention to public procurement officials. More recently, I have extended this
    agenda to the governance of emerging technologies, and especially artificial intelligence, in public
    organizations.
  </p>
  <p>
    I came to academia by way of the law and public service, having worked as a legal advisor and later as Head of the
    Public Procurement Office at Romania's National Trade Registry before completing my doctorate. That experience
    grounds the way I approach my research, teaching, and service.
  </p>
  <p>
    I care deeply about keeping scholarship in close conversation with practice. I write for practitioners and
    policymakers and prepare applied research with organizations such as NIGP, NASPO, NASCIO, the Publications Office
    of the European Union, and the IBM Center for the Business of Government. I also serve as Social Media Editor at
    the <a href="https://academic.oup.com/jpart" target="_blank">Journal of Public Administration Research and
    Theory</a> (JPART) and as Digital Engagement Associate Editor at the
    <a href="https://www.tandfonline.com/journals/upae20" target="_blank">Journal of Public Affairs Education</a>
    (JPAE).
  </p>

