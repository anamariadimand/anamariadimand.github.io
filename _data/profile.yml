short_bio: >-
  <p>
    I am an Assistant Professor in the <a href="https://cosspp.fsu.edu/askew/" target="_blank">Reubin O'D. Askew
    School of Public Administration and Policy</a> at Florida State University and a Global Research Fellow with the
    <a href="https://kogod.american.edu/sustainable-procurement-research-initiative-people-and-partners" target="_blank">Sustainable
    Procurement Research Initiative</a> at American University. My work examines how governments buy, contract, and
    partner to deliver public goods and services, and how these seemingly routine administrative decisions can serve
    as instruments for advancing sustainability and innovation in the public sector.
  </p>
  <p>
    My research is organized around three interrelated streams: the determinants of innovative and sustainable public
    service provision; public procurement as a strategic policy instrument for advancing public values rather than
    merely allocating resources; and the workplace conditions and human capital that shape the public service
    professionals who carry this work forward. More recently, I have extended this agenda to the governance of
    emerging technologies, particularly artificial intelligence, in the public sector, and to the organizational
    conditions that enable agencies to translate new ideas into practice.
  </p>
  <p>
    I came to public administration by way of the law, having begun my career as a legal advisor in Romania, an
    experience that continues to inform how I think about rules, administrative discretion, and the pursuit of sound
    outcomes for the public. I am committed to keeping scholarship in close conversation with practice. To that end,
    I write for practitioners and policymakers and collaborate with organizations such as NIGP, NASPO, and the IBM
    Center for the Business of Government. I also serve as Social Media Editor at the <em>Journal of Public
    Administration Research and Theory</em> (JPART) and as Digital Engagement Associate Editor at the <em>Journal of
    Public Affairs Education</em> (JPAE).
  </p>

